name: Generate OmniBox and TVBox Index

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 同时生成 index.json (备用) 和完美的 tvbox.json (给 TVBox 直连)
      - name: Generate JSON Indexes
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          // 1. 扫描所有本地爬虫分类
          const omniResult = {};
          fs.readdirSync('.').forEach(dir => {
            if (fs.statSync(dir).isDirectory() && !dir.startsWith('.') && dir !== 'node_modules') {
              const files = fs.readdirSync(dir).filter(file => file.endsWith('.js'));
              if (files.length > 0) {
                omniResult[dir] = files.map(file => ({
                  name: path.basename(file, '.js'),
                  path: \`\${dir}/\${file}\`
                }));
              }
            }
          });
          fs.writeFileSync('index.json', JSON.stringify(omniResult, null, 2));
          
          // 2. 组装成 TVBox 100% 能看懂的标准单文件格式
          const tvboxConfig = {
            // 这里使用全网最通用、兼容性最强的公共 JS 爬虫引擎包 (JAR)
            spider: 'https://raw.gitmirror.com/FongMi/Release/main/spider/release/spider.jar',
            sites: [],
            lives: [
              {
                name: '直播源',
                type: 0,
                url: 'https://iptv.djsb.hidns.vip/配置/筛选/duoduo.json', // 自动关联你仓库里的直播配置
                playerType: 1
              }
            ]
          };
          
          // 将你仓库里的所有 JS 爬虫，整整齐齐地塞进 TVBox 的 sites 点播源里
          Object.keys(omniResult).forEach(category => {
            omniResult[category].forEach(item => {
              tvboxConfig.sites.push({
                key: item.name,
                name: \`\${category} 🌟 \${item.name}\`,
                type: 3,
                api: \`csp_\${item.name}\`,
                searchable: 1,
                quickSearch: 1,
                filterable: 1,
                ext: \`https://iptv.djsb.hidns.vip/\${item.path}\`
              });
            });
          });
          
          fs.writeFileSync('tvbox.json', JSON.stringify(tvboxConfig, null, 2));
          console.log('TVBox 专属直链接口 tvbox.json 已经完美出炉！');
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json tvbox.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "纯云端自动化：发布专属 TVBox 接口" && git push)
