name: Generate OmniBox Index

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate JSON Index
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const result = {};
          
          fs.readdirSync('.').forEach(dir => {
            // 扫描所有非隐藏文件夹
            if (fs.statSync(dir).isDirectory() && !dir.startsWith('.') && dir !== 'node_modules') {
              const files = fs.readdirSync(dir).filter(file => file.endsWith('.js'));
              if (files.length > 0) {
                result[dir] = files.map(file => ({
                  name: path.basename(file, '.js'),
                  path: \`\${dir}/\${file}\`
                }));
              }
            }
          });
          
          fs.writeFileSync('index.json', JSON.stringify(result, null, 2));
          console.log('index.json 生成成功！');
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          // 如果没有文件变化则不提交，防止死循环
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新爬虫索引文件" && git push)
