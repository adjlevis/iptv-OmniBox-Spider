name: Generate OmniBox and TVBox Index

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 同时生成 index.json (给后台看) 和 tvbox.json (给 TVBox 直连看)
      - name: Generate JSON Indexes
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          // 1. 先生成原有的 index.json
          const omniResult = {};
          fs.readdirSync('.').forEach(dir => {
            if (fs.statSync(dir).isDirectory() && !dir.startsWith('.') && dir !== 'node_modules') {
              const files = fs.readdirSync(dir).filter(file => file.endsWith('.js'));
              if (files.length > 0) {
                omniResult[dir] = files.map(file => ({
                  name: path.basename(file, '.js'),
                  path: \`\${dir}/\${file}\`
                }));
              }
            }
          });
          fs.writeFileSync('index.json', JSON.stringify(omniResult, null, 2));
          
          // 2. 转换为 TVBox 标准单文件配置格式
          const tvboxConfig = {
            spider: 'https://iptv.djsb.hidns.vip/jar/custom_spider.jar', // 如果有自定义jar可以替换，没有可保持空架子
            sites: [],
            lives: []
          };
          
          // 把扫描到的所有 JS 爬虫组装成 TVBox 的 sites 节点
          Object.keys(omniResult).forEach(category => {
            omniResult[category].forEach(item => {
              tvboxConfig.sites.push({
                key: item.name,
                name: \`\${category} | \${item.name}\`,
                type: 3,
                api: \`csp_\${item.name}\`,
                ext: \`https://iptv.djsb.hidns.vip/\${item.path}\`
              });
            });
          });
          
          fs.writeFileSync('tvbox.json', JSON.stringify(tvboxConfig, null, 2));
          console.log('index.json 和 tvbox.json 均已完美生成！');
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json tvbox.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新 OmniBox & TVBox 接口" && git push)
