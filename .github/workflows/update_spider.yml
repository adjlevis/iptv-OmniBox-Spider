name: Generate OmniBox and TVBox Index

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 自动生成 index.json 和标准的 tvbox.json
      - name: Generate JSON Indexes
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          
          const omniResult = {};
          fs.readdirSync('.').forEach(dir => {
            if (fs.statSync(dir).isDirectory() && !dir.startsWith('.') && dir !== 'node_modules') {
              const files = fs.readdirSync(dir).filter(file => file.endsWith('.js'));
              if (files.length > 0) {
                omniResult[dir] = files.map(file => ({
                  name: path.basename(file, '.js'),
                  path: \`\${dir}/\${file}\`
                }));
              }
            }
          });
          fs.writeFileSync('index.json', JSON.stringify(omniResult, null, 2));
          
          const tvboxConfig = {
            spider: 'https://raw.gitmirror.com/FongMi/Release/main/spider/release/spider.jar',
            sites: [],
            lives: [
              {
                name: '直播源',
                type: 0,
                url: 'https://iptv.djsb.hidns.vip/配置/筛选/duoduo.json',
                playerType: 1
              }
            ]
          };
          
          Object.keys(omniResult).forEach(category => {
            omniResult[category].forEach(item => {
              tvboxConfig.sites.push({
                key: item.name,
                name: \`\${category} 🌟 \${item.name}\`,
                type: 3,
                api: \`csp_\${item.name}\`,
                searchable: 1,
                quickSearch: 1,
                filterable: 1,
                ext: \`https://iptv.djsb.hidns.vip/\${item.path}\`
              });
            });
          });
          
          fs.writeFileSync('tvbox.json', JSON.stringify(tvboxConfig, null, 2));
          console.log('TVBox 专属直链接口 tvbox.json 已经完美出炉！');
          "

      # 提交回仓库
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json tvbox.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "纯云端自动化：发布专属 TVBox 接口" && git push)

      # 🔥【新增步骤】直接绕过 Git 监听，由 GitHub 强行通知 Cloudflare 立即发布更新
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }} # 需要你在 GitHub 仓库设置里添加你的 CF 令牌
          accountId: ${{ secrets.CF_ACCOUNT_ID }} # 你的 CF 账户 ID
          projectName: 'iptv-omnibox-spider' # 你的 CF Pages 项目名称
          directory: '.' # 推送根目录下所有生成的文件
